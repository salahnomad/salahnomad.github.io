# --- Configuration du rendu Markdown ---
[markup.goldmark.renderer]
  unsafe = true
[markup.highlight]
   style = "github"
[outputs]
  home = ["HTML", "RSS"]
  page = ["HTML"]
  section = ["HTML", "RSS"]
  taxonomy = ["HTML", "RSS"]
  term = ["HTML", "RSS"]
[related]
  threshold = 80
  includeNewer = false
  toLower = true
  [[related.indices]]
    name = "tags"
    weight = 100
  [[related.indices]]
    name = "section"
    weight = 100
[imaging]
  resampleFilter = "Lanczos"
  quality = 80
[sitemap]
  changefreq = "weekly"
  priority = 0.5
  filename = "sitemap.xml"
# --- Fin du fichier ---