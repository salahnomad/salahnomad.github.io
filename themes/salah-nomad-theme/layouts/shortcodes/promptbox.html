{{/*
  Shortcode Universel v2 pour une "Prompt Box".
  Utilise nl2br pour préserver les sauts de ligne sans générer de paragraphes non désirés.
*/}}
<div class="prompt-box">
  {{ with .Get "title" }}
    <div class="prompt-box-title">{{ . }}</div>
  {{ end }}
  <div class="prompt-box-content">
    {{ .Inner | .Page.RenderString }}
  </div>
</div>
